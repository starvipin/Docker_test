name: Python CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      # Step 1: Code ko repository se uthana
      - name: Check out code
        uses: actions/checkout@v4

      # Step 2: 'uv' package manager ko install karna
      - name: Install uv
        uses: astral-sh/setup-uv@v3

      # Step 3: Python environment setup karna
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      # Step 4: Dependencies install karna (using uv)
      - name: Install dependencies
        run: |
          uv sync --all-extras --dev

      # Step 5: Tests run karna
      - name: Run tests
        run: uv run pytest