name: Flask Docker CI/CD

on:
  push:
    branches:
      - main

jobs:
  build-test-and-push:
    runs-on: ubuntu-latest

    steps:
      # 1. Code checkout karo
      - name: Check out code
        uses: actions/checkout@v4

      # 2. Image Build karo (Aapke Docker username ke prefix ke sath)
      - name: Build Docker Image
        run: docker build -t ${{ secrets.DOCKER_USERNAME }}/docker-flask-app:latest .

      # 3. Pehle Test run karo
      - name: Run Tests in Docker Container
        run: docker run ${{ secrets.DOCKER_USERNAME }}/docker-flask-app:latest uv run pytest

      # 4. Docker Hub par Login karo (Secrets ka use karke)
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # 5. Image ko Docker Hub par push kar do
      - name: Push Image to Docker Hub
        run: docker push ${{ secrets.DOCKER_USERNAME }}/docker-flask-app:latest